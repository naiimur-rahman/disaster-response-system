<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Emergency Contacts — DisasterRelief BD</title>
<link rel="stylesheet" href="css/style.css"/>
<link rel="stylesheet" href="css/responsive.css"/>
</head>
<body>
<div class="layout">
  <div class="main-content">
    <div class="page-header">
      <div>
        <button class="menu-toggle">☰</button>
        <h1 class="page-title">📞 <span>Emergency Contacts</span></h1>
        <p class="page-subtitle">Key contacts for disaster response coordination</p>
      </div>
      <button class="btn btn-primary" onclick="openModal('addContactModal')">➕ Add Contact</button>
    </div>

    <!-- Filters -->
    <div class="filters">
      <select class="form-control" id="filterType" onchange="loadContacts()">
        <option value="">All Service Types</option>
        <option>Fire</option><option>Medical</option><option>Police</option>
        <option>Army</option><option>NGO</option><option>Government</option>
      </select>
      <select class="form-control" id="filterActive" onchange="loadContacts()">
        <option value="">All Status</option>
        <option value="true">Active</option>
        <option value="false">Inactive</option>
      </select>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead><tr><th>#</th><th>Organization</th><th>Service Type</th><th>Phone</th><th>Coverage</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="contactsTable"></tbody>
        </table>
      </div>
      <div id="paginationBar" style="padding:16px;text-align:center;color:var(--text-muted);font-size:0.85rem"></div>
    </div>
  </div>
</div>

<!-- Add Contact Modal -->
<div class="modal-overlay" id="addContactModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">📞 Add Emergency Contact</h3>
      <button class="modal-close" onclick="closeModal('addContactModal')">✕</button>
    </div>
    <form id="addContactForm">
      <div class="form-group">
        <label class="form-label">Organization Name *</label>
        <input class="form-control" name="organization_name" placeholder="e.g. Bangladesh Fire Service" required/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Service Type *</label>
          <select class="form-control" name="service_type" required>
            <option>Fire</option><option>Medical</option><option>Police</option>
            <option>Army</option><option>NGO</option><option>Government</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Phone *</label>
          <input class="form-control" name="phone" placeholder="e.g. 199" required/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Zone Coverage</label>
        <input class="form-control" name="zone_coverage" placeholder="e.g. Nationwide"/>
      </div>
      <div class="form-group">
        <label class="form-label">
          <input type="checkbox" name="is_active" value="1" checked style="margin-right:6px"/>
          Active
        </label>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('addContactModal')">Cancel</button>
        <button type="submit" class="btn btn-primary">📞 Add Contact</button>
      </div>
    </form>
  </div>
</div>

<!-- Edit Contact Modal -->
<div class="modal-overlay" id="editContactModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">✏️ Edit Emergency Contact</h3>
      <button class="modal-close" onclick="closeModal('editContactModal')">✕</button>
    </div>
    <form id="editContactForm">
      <input type="hidden" name="contact_id"/>
      <div class="form-group">
        <label class="form-label">Organization Name *</label>
        <input class="form-control" name="organization_name" required/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Service Type *</label>
          <select class="form-control" name="service_type">
            <option>Fire</option><option>Medical</option><option>Police</option>
            <option>Army</option><option>NGO</option><option>Government</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Phone *</label>
          <input class="form-control" name="phone" required/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Zone Coverage</label>
        <input class="form-control" name="zone_coverage"/>
      </div>
      <div class="form-group">
        <label class="form-label">
          <input type="checkbox" name="is_active" id="editIsActive" value="1" style="margin-right:6px"/>
          Active
        </label>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('editContactModal')">Cancel</button>
        <button type="submit" class="btn btn-primary">💾 Save Changes</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/sidebar.js"></script>
<script>
let currentPage = 1;

const SERVICE_ICONS = { Fire:'🔥', Medical:'🏥', Police:'👮', Army:'🪖', NGO:'🤝', Government:'🏛️' };

async function loadContacts(page = 1) {
  currentPage = page;
  const tbody = document.getElementById('contactsTable');
  skeletonRows(tbody, 7);
  const type   = document.getElementById('filterType').value;
  const active = document.getElementById('filterActive').value;
  const params = new URLSearchParams({ page, limit: 20 });
  if (type)   params.set('service_type', type);
  if (active !== '') params.set('is_active', active);
  try {
    const data = await api.get('/emergency-contacts?' + params);
    if (!data || !data.data.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:30px">No contacts found</td></tr>';
      document.getElementById('paginationBar').textContent = '';
      return;
    }
    tbody.innerHTML = data.data.map(c => `
      <tr>
        <td>${c.contact_id}</td>
        <td><strong>${c.organization_name}</strong></td>
        <td>${SERVICE_ICONS[c.service_type] || ''} ${c.service_type}</td>
        <td><a href="tel:${c.phone}" style="color:var(--primary)">${c.phone}</a></td>
        <td>${c.zone_coverage || '—'}</td>
        <td>${c.is_active ? '<span class="badge badge-available">Active</span>' : '<span class="badge badge-closed">Inactive</span>'}</td>
        <td style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" onclick='editContact(${JSON.stringify(c)})'>✏️ Edit</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteContact(${c.contact_id})">🗑️</button>
        </td>
      </tr>`).join('');
    const p = data.pagination;
    document.getElementById('paginationBar').innerHTML =
      `Page ${p.page} of ${p.totalPages} &nbsp;|&nbsp; Total: ${p.total}
       ${p.page > 1 ? `<button class="btn btn-ghost btn-sm" onclick="loadContacts(${p.page-1})">◀ Prev</button>` : ''}
       ${p.page < p.totalPages ? `<button class="btn btn-ghost btn-sm" onclick="loadContacts(${p.page+1})">Next ▶</button>` : ''}`;
  } catch(e){ toast(e.message,'error'); }
}

function editContact(c) {
  const form = document.getElementById('editContactForm');
  form.contact_id.value        = c.contact_id;
  form.organization_name.value = c.organization_name;
  form.service_type.value      = c.service_type;
  form.phone.value             = c.phone;
  form.zone_coverage.value     = c.zone_coverage || '';
  document.getElementById('editIsActive').checked = !!c.is_active;
  openModal('editContactModal');
}

async function deleteContact(id) {
  if (!confirm('Delete this emergency contact?')) return;
  try {
    await api.del('/emergency-contacts/' + id);
    toast('Deleted','success');
    loadContacts(currentPage);
  } catch(e){ toast(e.message,'error'); }
}

document.getElementById('addContactForm').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = Object.fromEntries(fd);
  body.is_active = e.target.querySelector('[name=is_active]').checked ? 1 : 0;
  try {
    await api.post('/emergency-contacts', body);
    toast('Contact added!','success');
    closeModal('addContactModal');
    e.target.reset();
    loadContacts();
  } catch(err){ toast(err.message,'error'); }
});

document.getElementById('editContactForm').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = Object.fromEntries(fd);
  body.is_active = document.getElementById('editIsActive').checked ? 1 : 0;
  const id = body.contact_id;
  delete body.contact_id;
  try {
    await api.put('/emergency-contacts/' + id, body);
    toast('Updated!','success');
    closeModal('editContactModal');
    loadContacts(currentPage);
  } catch(err){ toast(err.message,'error'); }
});

document.addEventListener('DOMContentLoaded', loadContacts);
</script>
</body>
</html>
